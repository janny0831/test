                else if (step === 30) {
                    return <AdminHomeView submissions={allSubmissions} onGoResult={() => {setStep(31); window.scrollTo(0,0);}} onGoScatter={() => {setStep(32); window.scrollTo(0,0);}} onGoDetail={viewUserDetail} onDelete={handleDeleteSubmissions} />;
                } else if (step === 31) {
                    return <ResultListView avgAnswers={avgAnswers} questions={questionsData} numSubmissions={numSubmissions} onBack={() => {setStep(30); window.scrollTo(0,0);}} hideCompare={true} onNext={null} />;
                } else if (step === 32) {
                    return <ScatterChartView avgAnswers={avgAnswers} questions={questionsData} numSubmissions={numSubmissions} onBack={() => {setStep(30); window.scrollTo(0,0);}} hideCompare={true} theme={theme} />;
                } else if (step === 33) {
                    return <DetailedCompareView myAnswers={adminTargetAnswers} avgAnswers={avgAnswers} questions={questionsData} numSubmissions={numSubmissions} user={adminTargetUser} onBack={() => {setStep(30); window.scrollTo(0,0);}} isAdmin={true} onSaveEdit={handleAdminEditAnswer} />;
                }
            };

            return (
                <div className="min-h-screen relative font-sans">
                    {/* 流體背景 */}
                    <div className="blob-container">
                        <div className="blob blob-1"></div>
                        <div className="blob blob-2"></div>
                        <div className="blob blob-3"></div>
                    </div>

                    {/* 全域 Loading Overlay */}
                    {isLoading && (
                        <div className="fixed inset-0 z-[200] bg-slate-900/40 backdrop-blur-md flex items-center justify-center">
                            <div className="glass p-8 rounded-3xl text-center flex flex-col items-center">
                                <div className="animate-spin rounded-full h-14 w-14 border-4 border-slate-200 dark:border-slate-800 border-t-blue-500 mb-4"></div>
                                <p className="text-slate-800 dark:text-white font-bold text-lg">正在同步雲端資料庫中...</p>
                            </div>
                        </div>
                    )}

                    <header className="glass border-b border-slate-200 dark:border-white/10 sticky top-0 z-50 bg-white/40 dark:bg-slate-900/40 backdrop-blur-2xl shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3 text-xl font-bold text-slate-800 dark:text-white tracking-wide">
                                <span className="text-2xl drop-shadow-md">🌍</span>
                                <div>
                                    大量科技 氣候風險與機會評估系統
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-4 text-sm font-medium">
                                {/* 資料庫連線狀態指示燈 */}
                                <div className={`px-3 py-1.5 rounded-full flex items-center gap-2 border text-xs font-bold ${
                                    gasStatus === 'connected' 
                                        ? 'bg-emerald-500/10 text-emerald-600 border-emerald-500/20 dark:bg-emerald-500/20 dark:text-emerald-400' 
                                        : gasStatus === 'error'
                                            ? 'bg-rose-500/10 text-rose-600 border-rose-500/20 dark:bg-rose-500/20 dark:text-rose-400'
                                            : 'bg-amber-500/10 text-amber-600 border-amber-500/20 dark:bg-amber-500/20 dark:text-amber-400'
                                }`}>
                                    <span className={`w-2.5 h-2.5 rounded-full ${
                                        gasStatus === 'connected' 
                                            ? 'bg-emerald-500 animate-pulse' 
                                            : gasStatus === 'error'
                                                ? 'bg-rose-500'
                                                : 'bg-amber-500'
                                    }`}></span>
                                    {gasStatus === 'connected' 
                                        ? '☁️ 雲端已連線' 
                                        : gasStatus === 'error'
                                            ? '⚠️ 雲端同步失敗 (本地模式)'
                                            : '💾 本地暫存模式'
                                    }
                                </div>

                                {/* 亮暗模式切換按鈕 */}
                                <button 
                                    onClick={toggleTheme} 
                                    className="p-2.5 rounded-xl text-xl bg-white/30 dark:bg-slate-800/30 hover:bg-white/50 dark:hover:bg-white/10 backdrop-blur-md border border-slate-200 dark:border-white/10 transition-all shadow-sm hover:scale-105"
                                    title={theme === 'dark' ? '切換為亮色模式' : '切換為暗色模式'}
                                >
                                    {theme === 'dark' ? '🌞' : '🌙'}
                                </button>

                                {currentUser && (
                                    <>
                                        <div className={`px-4 py-2 rounded-xl shadow-sm border backdrop-blur-md ${currentUser.isAdmin ? 'bg-violet-500/10 text-violet-700 border-violet-200 dark:bg-violet-500/20 dark:text-violet-300 dark:border-violet-500/30' : 'bg-white/30 text-slate-700 border-slate-200 dark:bg-slate-800/50 dark:text-slate-300 dark:border-white/10'}`}>
                                            <span className="opacity-70 mr-2">登入者</span>
                                            {currentUser.name} {currentUser.isAdmin && '(管理員)'}
                                        </div>
                                        
                                        {/* 回到登入畫面按鈕 */}
                                        <button 
                                            onClick={handleBackToLogin} 
                                            className="text-slate-600 dark:text-slate-300 hover:text-rose-500 dark:hover:text-rose-400 transition-all flex items-center gap-1 bg-white/30 dark:bg-white/5 hover:bg-white/50 dark:hover:bg-white/10 border border-slate-200 dark:border-white/10 px-4 py-2 rounded-xl backdrop-blur-md shadow-sm hover:shadow-md"
                                        >
                                            回到登入畫面
                                        </button>
                                    </>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="pt-8 sm:pt-12 relative z-10">
                        {renderContent()}
                    </main>

                    {/* 自訂登出確認彈窗 */}
                    {showLogoutModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/40 backdrop-blur-md px-4 animate-fade-in-up">
                            <div className="glass p-8 rounded-3xl max-w-sm w-full shadow-[0_20px_50px_rgba(0,0,0,0.3)] text-center border border-white/20 bg-white/70 dark:bg-slate-800/70">
                                <div className="text-5xl mb-4 drop-shadow-md animate-bounce">⚠️</div>
                                <h3 className="text-2xl font-bold text-slate-800 dark:text-white mb-2">確定要登出嗎？</h3>
                                <p className="text-slate-600 dark:text-slate-300 mb-8 font-medium">未儲存的進度將會遺失。</p>
                                <div className="flex gap-4 justify-center">
                                    <button 
                                        onClick={() => setShowLogoutModal(false)} 
                                        className="px-6 py-3 rounded-xl font-semibold bg-slate-200/50 hover:bg-slate-300/50 text-slate-700 dark:bg-slate-700/50 dark:hover:bg-slate-600/50 dark:text-white backdrop-blur-sm border border-slate-300 dark:border-white/10 transition-all w-1/2"
                                    >
                                        取消
                                    </button>
                                    <button 
                                        onClick={confirmLogout} 
                                        className="px-6 py-3 rounded-xl font-semibold bg-gradient-to-r from-rose-500 to-pink-500 hover:from-rose-400 hover:to-pink-400 text-white shadow-lg shadow-rose-500/30 border border-white/20 transition-all w-1/2"
                                    >
                                        確定
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
